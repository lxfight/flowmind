services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: flowmind-postgres
    environment:
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind_secret
      POSTGRES_DB: flowmind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowmind-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://flowmind:flowmind_secret@postgres:5432/flowmind
      JWT_SECRET: "${JWT_SECRET:-}"
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FLOWMIND_ADMIN_PASSWORD: "${FLOWMIND_ADMIN_PASSWORD:-}"
      DEBUG: "${DEBUG:-false}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowmind-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
