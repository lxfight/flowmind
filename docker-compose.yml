services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: flowmind-postgres
    environment:
      POSTGRES_USER: flowmind
      POSTGRES_PASSWORD: flowmind_secret
      POSTGRES_DB: flowmind
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/lxfight/flowmind-backend:${FLOWMIND_VERSION:-local}
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: "${FLOWMIND_VERSION:-0.2.0}"
        GIT_SHA: "${GIT_SHA:-development}"
        BUILD_TIME: "${BUILD_TIME:-}"
    container_name: flowmind-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://flowmind:flowmind_secret@postgres:5432/flowmind
      JWT_SECRET: "${JWT_SECRET:-}"
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      FLOWMIND_ADMIN_PASSWORD: "${FLOWMIND_ADMIN_PASSWORD:-}"
      DEBUG: "${DEBUG:-false}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-gpt-4o-mini}"
      LLM_EMBEDDING_MODEL: "${LLM_EMBEDDING_MODEL:-text-embedding-3-small}"
      LLM_EMBEDDING_DIM: "${LLM_EMBEDDING_DIM:-1536}"
      EMBEDDING_API_KEY: "${EMBEDDING_API_KEY:-}"
      EMBEDDING_BASE_URL: "${EMBEDDING_BASE_URL:-}"
      KNOWLEDGE_MAX_BYTES: "${KNOWLEDGE_MAX_BYTES:-26214400}"
      RELEASE_REPOSITORY: "${RELEASE_REPOSITORY:-lxfight/flowmind}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      UPDATER_URL: "http://updater:8090"
      UPDATER_TOKEN: "${FLOWMIND_UPDATER_TOKEN:-flowmind-local-updater-change-me}"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped

  frontend:
    image: ghcr.io/lxfight/flowmind-frontend:${FLOWMIND_VERSION:-local}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        APP_VERSION: "${FLOWMIND_VERSION:-0.2.0}"
        GIT_SHA: "${GIT_SHA:-development}"
        BUILD_TIME: "${BUILD_TIME:-}"
    container_name: flowmind-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  updater:
    image: ghcr.io/lxfight/flowmind-updater:${FLOWMIND_VERSION:-local}
    build:
      context: ./updater
      dockerfile: Dockerfile
      args:
        APP_VERSION: "${FLOWMIND_VERSION:-0.2.0}"
        GIT_SHA: "${GIT_SHA:-development}"
        BUILD_TIME: "${BUILD_TIME:-}"
    container_name: flowmind-updater
    environment:
      FLOWMIND_UPDATER_TOKEN: "${FLOWMIND_UPDATER_TOKEN:-flowmind-local-updater-change-me}"
      FLOWMIND_PROJECT_DIR: "${PWD}"
      FLOWMIND_UPDATE_STATE_DIR: /state
      COMPOSE_PROJECT_NAME: flowmind
    working_dir: "${PWD}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - "${PWD}:${PWD}"
      - updater_state:/state
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  updater_state:
