# Release notes generated from Conventional Commits.
[changelog]
header = ""
body = """
{%- macro remote_url() -%}
https://github.com/lxfight/flowmind
{%- endmacro -%}

{% if version %}\
{% if previous.version %}\
## FlowMind {{ version | trim_start_matches(pat="v") }}

[查看完整差异]({{ self::remote_url() }}/compare/{{ previous.version }}..{{ version }}) · {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## FlowMind {{ version | trim_start_matches(pat="v") }} · {{ timestamp | date(format="%Y-%m-%d") }}
{% endif %}\
{% else %}\
## 尚未发布
{% endif %}

{% for group in ["新功能", "问题修复", "性能优化", "界面与样式", "代码重构", "构建与部署", "持续集成", "文档", "测试", "维护", "回退", "其他变更"] %}\
{% set grouped_commits = commits | filter(attribute="group", value=group) %}\
{% if grouped_commits | length > 0 %}\
### {{ group }}

{% for commit in grouped_commits %}\
- {% if commit.breaking %}**破坏性变更：** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ self::remote_url() }}/commit/{{ commit.id }}))
{% endfor %}
{% endif %}\
{% endfor %}\
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
render_always = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
commit_preprocessors = [
  { pattern = "(?s)\\n.*", replace = "" },
]
commit_parsers = [
  { message = "^feat", group = "新功能" },
  { message = "^fix", group = "问题修复" },
  { message = "^perf", group = "性能优化" },
  { message = "^refactor", group = "代码重构" },
  { message = "^style", group = "界面与样式" },
  { message = "^build", group = "构建与部署" },
  { message = "^ci", group = "持续集成" },
  { message = "^docs", group = "文档" },
  { message = "^test", group = "测试" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "维护" },
  { message = "^revert", group = "回退" },
  { message = ".*", group = "其他变更" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]+\\.[0-9]+\\.[0-9]+.*"
sort_commits = "oldest"
