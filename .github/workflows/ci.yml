name: CI

on:
  push:
  pull_request:

jobs:
  release-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Validate version metadata
        run: scripts/check-version.sh
      - name: Validate Conventional Commits
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            range="${BASE_SHA}..${HEAD_SHA}"
          elif [[ -n "${EVENT_BEFORE}" && "${EVENT_BEFORE}" != "0000000000000000000000000000000000000000" ]]; then
            range="${EVENT_BEFORE}..${HEAD_SHA}"
          elif git rev-parse "${HEAD_SHA}^" >/dev/null 2>&1; then
            range="${HEAD_SHA}^..${HEAD_SHA}"
          else
            range="${HEAD_SHA}"
          fi
          scripts/check-commit-messages.sh "${range}"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite:///./ci.db
      JWT_SECRET: ci-test-secret
      FLOWMIND_ADMIN_PASSWORD: adminpass
      LLM_API_KEY: ""
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - run: python -m pip install pytest pytest-asyncio ruff
      - run: ruff check
      - run: python -m compileall app
      - run: pytest -v
      - run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from sqlalchemy.orm import configure_mappers

          import app.models.activity
          import app.models.knowledge
          import app.models.project
          import app.models.task
          import app.models.user
          from app.main import app

          configure_mappers()
          client = TestClient(app)
          assert client.get("/api/health").status_code == 200
          assert client.get("/openapi.json").status_code == 200
          PY

  # Manual e2e/smoke scripts in backend/tests_e2e/. Each script is
  # self-contained: it creates its own temporary SQLite database; the three
  # API scripts run against an in-process FastAPI TestClient, and
  # ws_smoke_test starts its own uvicorn server on 127.0.0.1:8765. No LLM
  # API key is required. This job is non-blocking (continue-on-error) so a
  # failure is visible in the check list but never blocks PRs.
  e2e-smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: sqlite+aiosqlite:///./ci-e2e.db
      JWT_SECRET: ci-e2e-secret
      FLOWMIND_ADMIN_PASSWORD: adminpass
      LLM_API_KEY: ""
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e .
      - name: Run e2e smoke scripts
        run: |
          set -o pipefail
          failed=0
          for script in test_due_date_e2e test_notifications_e2e test_task_search_e2e test_agent_undo_e2e ws_smoke_test; do
            echo "=== tests_e2e.$script ==="
            python -m "tests_e2e.$script" || failed=1
          done
          exit "$failed"
