name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        shell: bash
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          test "v${version}" = "${GITHUB_REF_NAME}"
          test "${version}" = "$(node -p "require('./frontend/package.json').version")"
          test "${version}" = "$(sed -n 's/^version = "\([^"]*\)"/\1/p' backend/pyproject.toml | head -n1)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, updater]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.validate.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  release:
    needs: [validate, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
