name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      build_time: ${{ steps.version.outputs.build_time }}
    steps:
      - uses: actions/checkout@v7
      - id: version
        shell: bash
        run: |
          version="$(scripts/check-version.sh "${GITHUB_REF_NAME}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

  publish:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, updater]
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.component }}
          tags: |
            type=raw,value=${{ needs.validate.outputs.version }}
            type=sha
      - uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ needs.validate.outputs.version }}
            GIT_SHA=${{ github.sha }}
            BUILD_TIME=${{ needs.validate.outputs.build_time }}

  release:
    needs: [validate, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: RELEASE_NOTES.md
          GITHUB_REPO: ${{ github.repository }}
      - uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
          files: RELEASE_NOTES.md
